<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH-BLE-MIDI Configurator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; color: #00ffcc; font-size: 1.5rem; margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 12px; background-color: #00ffcc; color: #121212; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; text-align: center; cursor: pointer; margin-bottom: 20px; box-sizing: border-box; }
        .btn-send { background-color: #ff0055; color: white; margin-top: 30px; margin-bottom: 50px; }
        .btn:disabled { background-color: #555; color: #888; }
        .card { background-color: #1e1e1e; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .card-title { font-size: 1.1rem; color: #00ffcc; margin-top: 0; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .sub-section { margin-bottom: 15px; padding-left: 5px; }
        .sub-title { font-size: 0.9rem; color: #ffaa00; font-weight: bold; margin-bottom: 8px; }
        .form-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; }
        select, input[type="number"] { background-color: #2a2a2a; color: white; border: 1px solid #444; border-radius: 6px; padding: 6px; width: 120px; box-sizing: border-box; }
        .status { text-align: center; font-size: 0.9rem; color: #aaa; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>RH-BLE-MIDI Config</h1>
    
    <button id="connectBtn" class="btn" onclick="connectBLE()">① 設定モードのコントローラーに接続</button>
    <div id="statusText" class="status">状態: 未接続 (コントローラーを設定モードで起動してください)</div>

    <form id="configForm">
        <script>
            const swNames = ["SW1 (D3)", "SW2 (D4)", "SW3 (D5)", "SW4 (D9)", "SW5 (D10)"];
            const defaultVals = [
                {n_m:1, n_on:21, n_off:22, n_l:0,  s_m:1, s_on:31, s_off:32, s_l:0}, 
                {n_m:1, n_on:23, n_off:24, n_l:0,  s_m:1, s_on:33, s_off:34, s_l:0}, 
                {n_m:0, n_on:25, n_off:0,  n_l:0,  s_m:0, s_on:35, s_off:0,  s_l:0}, 
                {n_m:0, n_on:26, n_off:0,  n_l:0,  s_m:0, s_on:36, s_off:0,  s_l:0}, 
                {n_m:2, n_on:27, n_off:0,  n_l:28, s_m:2, s_on:37, s_off:0,  s_l:38} 
            ];

            for(let i=0; i<5; i++) {
                document.write(`
                <div class="card">
                    <div class="card-title">${swNames[i]}</div>
                    
                    <div class="sub-section">
                        <div class="sub-title">【 通常時設定 】</div>
                        <div class="form-group">
                            <label>動作モード</label>
                            <select id="m${i}n">
                                <option value="0" ${defaultVals[i].n_m==0?'selected':''}>シングル</option>
                                <option value="1" ${defaultVals[i].n_m==1?'selected':''}>トグル</option>
                                <option value="2" ${defaultVals[i].n_m==2?'selected':''}>シングル+長押し</option>
                                <option value="3" ${defaultVals[i].n_m==3?'selected':''}>トグル+長押し</option>
                            </select>
                        </div>
                        <div class="form-group"><label>ON/通常時 CC</label><input type="number" id="on${i}n" value="${defaultVals[i].n_on}" min="0" max="127"></div>
                        <div class="form-group"><label>OFF時 CC (0で無効)</label><input type="number" id="off${i}n" value="${defaultVals[i].n_off}" min="0" max="127"></div>
                        <div class="form-group"><label>長押し CC (0で無効)</label><input type="number" id="l${i}n" value="${defaultVals[i].n_l}" min="0" max="127"></div>
                    </div>

                    <div class="sub-section">
                        <div class="sub-title">【 シフト時設定 】</div>
                        <div class="form-group">
                            <label>動作モード</label>
                            <select id="m${i}s">
                                <option value="0" ${defaultVals[i].s_m==0?'selected':''}>シングル</option>
                                <option value="1" ${defaultVals[i].s_m==1?'selected':''}>トグル</option>
                                <option value="2" ${defaultVals[i].s_m==2?'selected':''}>シングル+長押し</option>
                                <option value="3" ${defaultVals[i].s_m==3?'selected':''}>トグル+長押し</option>
                            </select>
                        </div>
                        <div class="form-group"><label>ON/通常時 CC</label><input type="number" id="on${i}s" value="${defaultVals[i].s_on}" min="0" max="127"></div>
                        <div class="form-group"><label>OFF時 CC (0で無効)</label><input type="number" id="off${i}s" value="${defaultVals[i].s_off}" min="0" max="127"></div>
                        <div class="form-group"><label>長押し CC (0で無効)</label><input type="number" id="l${i}s" value="${defaultVals[i].s_l}" min="0" max="127"></div>
                    </div>
                </div>
                `);
            }
        </script>

        <div class="card">
            <div class="card-title">ポテンショメーター (D0)</div>
            <div class="form-group"><label>通常時 出力CC</label><input type="number" id="potn" value="10" min="0" max="127"></div>
            <div class="form-group"><label>シフト時 出力CC</label><input type="number" id="pots" value="11" min="0" max="127"></div>
        </div>

        <button type="button" id="sendBtn" class="btn btn-send" onclick="sendConfig()" disabled>② 設定を送信して反映</button>
    </form>
</div>

<script>
    const CONFIG_SERVICE_UUID = "e2000001-3868-4112-a1a9-f2669d106bf4";
    const CONFIG_CHAR_UUID    = "e2000002-3868-4112-a1a9-f2669d106bf4";

    let bleDevice = null;
    let configCharacteristic = null;

    async function connectBLE() {
        try {
            document.getElementById("statusText").innerText = "設定モードの電波をスキャン中...";
            
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ services: [CONFIG_SERVICE_UUID] }]
            });

            const server = await bleDevice.gatt.connect();
            const service = await server.getPrimaryService(CONFIG_SERVICE_UUID);
            configCharacteristic = await service.getCharacteristic(CONFIG_CHAR_UUID);

            document.getElementById("statusText").innerText = "設定データを読み込み中...";

            // 🎯 【新実装：双方向同期】XIAO側のフラッシュメモリに現在ある42バイトの設定値を読み出す
            const valueDataView = await configCharacteristic.readValue();
            
            // 読み出したバイナリデータを画面のUI要素へ逆展開（デシリアライズ）
            if (valueDataView.byteLength === 42) {
                let idx = 0;
                for(let i=0; i<5; i++) {
                    document.getElementById(`m${i}n`).value   = valueDataView.getUint8(idx++);
                    document.getElementById(`on${i}n`).value  = valueDataView.getUint8(idx++);
                    document.getElementById(`off${i}n`).value = valueDataView.getUint8(idx++);
                    document.getElementById(`l${i}n`).value   = valueDataView.getUint8(idx++);

                    document.getElementById(`m${i}s`).value   = valueDataView.getUint8(idx++);
                    document.getElementById(`on${i}s`).value  = valueDataView.getUint8(idx++);
                    document.getElementById(`off${i}s`).value = valueDataView.getUint8(idx++);
                    document.getElementById(`l${i}s`).value   = valueDataView.getUint8(idx++);
                }
                document.getElementById("potn").value = valueDataView.getUint8(idx++);
                document.getElementById("pots").value = valueDataView.getUint8(idx++);
                
                document.getElementById("statusText").innerText = "状態: 接続完了＆設定同期完了！";
            } else {
                document.getElementById("statusText").innerText = "状態: 接続完了 (データサイズ不一致)";
            }

            document.getElementById("statusText").style.color = "#00ffcc";
            document.getElementById("sendBtn").disabled = false;
            document.getElementById("connectBtn").innerText = "接続済み";
        } catch (error) {
            console.log(error);
            document.getElementById("statusText").innerText = "状態: 接続失敗 (" + error.message + ")";
            document.getElementById("statusText").style.color = "#ff0055";
        }
    }

    async function sendConfig() {
        if (!configCharacteristic) return;

        const data = new Uint8Array(42);
        let idx = 0;

        for(let i=0; i<5; i++) {
            data[idx++] = parseInt(document.getElementById(`m${i}n`).value);
            data[idx++] = parseInt(document.getElementById(`on${i}n`).value);
            data[idx++] = parseInt(document.getElementById(`off${i}n`).value);
            data[idx++] = parseInt(document.getElementById(`l${i}n`).value);

            data[idx++] = parseInt(document.getElementById(`m${i}s`).value);
            data[idx++] = parseInt(document.getElementById(`on${i}s`).value);
            data[idx++] = parseInt(document.getElementById(`off${i}s`).value);
            data[idx++] = parseInt(document.getElementById(`l${i}s`).value);
        }

        data[idx++] = parseInt(document.getElementById("potn").value);
        data[idx++] = parseInt(document.getElementById("pots").value);

        try {
            if (typeof configCharacteristic.writeValueWithoutResponse === 'function') {
                await configCharacteristic.writeValueWithoutResponse(data);
            } else {
                await configCharacteristic.writeValue(data);
            }
            alert("設定をコントローラーに書き込みました！LEDの高速点滅を確認したら、コントローラーの電源を入れ直して通常モードで起動してください。");
        } catch (error) {
            alert("送信失敗: " + error.message);
        }
    }
</script>
</body>
</html>
